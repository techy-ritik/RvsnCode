<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Index</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <nav>
      <button type="button" class="btn">+ Create new Table</button>
    </nav>
    

    <!-- create table form popup -->
    <div class="popup">
      <form class="tableForm" action="/create-table" method="post">
        <span class="close">&times;</span>

        <h2>Create Table</h2>

        <label for="tableName">Table Name</label>
        <input type="text" name="table-name" id="tableName" />

        <div class="fieldData">
          <div class="fieldName">
            <label for="fieldName">Field names</label>
            <input type="text" name="field-name" id="fieldName" pattern="[A-Za-z0-9 ]+" required/>
          </div>

          <div class="type">
            <label for="type">Type</label>
            <select name="type" id="type">
              <option value="STRING">STRING</option>
              <option value="INTEGER">INTEGER</option>
              <option value="BOOLEAN">BOOLEAN</option>
              <option value="JSON">JSON</option>
              <option value="DOUBLE">DOUBLE</option>
            </select>
          </div>
        </div>

        <button type="button" class="addFieldBtn">Add another field</button>
        <button type="submit" class="createtableBtn">Create Table</button>
      </form>
    </div>

    <!-- insert record form popup --> 
     <div class="recordFormPopup">
      <form action="/insert-record" method="post" class="insertRecord">
        <span class="closeRecordForm">&times;</span>
        <h2>Add Record</h2>

        <button type="submit" class="addRecordBtn">Add Record</button>
      </form>
     </div>
    

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"></script>
    <script src="/js/indexClient.js"></script>
  </body>
</html>
